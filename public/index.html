<script>
const A='/api',T={fire:{l:'Fire',i:'🔥'},accident:{l:'Traffic',i:'🚗'},suspicious:{l:'Suspicious',i:'👁️'},crime:{l:'Crime',i:'🚨'},medical:{l:'Medical',i:'🏥'},sos:{l:'SOS',i:'🆘'},other:{l:'Other',i:'—'}};
let tk=localStorage.getItem('ct'),CU=null,incs=[],mks={},hL=null,sH=false,sk=null,ft='all',sT3=null,sLL=null,pl=false,dI2=null,aM='login',mV={},dM2='c',pM={},iP=false,pW=null,vkId=null,lang=localStorage.getItem('clang')||'ru';
let vkSdkLoaded=false,vkWidgetInited=false,vkProcessedCodes=new Set();

async function iVk(){
  try{
    const r=await fetch(`${A}/vk/config`);
    const d=await r.json();
    if(!d.app_id)return;
    vkId=d.app_id;
  }catch{
    return;
  }

  if(!vkSdkLoaded){
    const existing=document.querySelector('script[data-vkid-sdk="1"]');
    if(existing&&window.VKIDSDK){
      vkSdkLoaded=true;
      initVkWidget();
      return;
    }
    const sc=document.createElement('script');
    sc.src='https://unpkg.com/@vkid/sdk@<3.0.0/dist-sdk/umd/index.js';
    sc.setAttribute('data-vkid-sdk','1');
    sc.onload=()=>{vkSdkLoaded=true;initVkWidget();};
    sc.onerror=()=>ts('VK SDK load error');
    document.head.appendChild(sc);
    return;
  }

  initVkWidget();
}

function initVkWidget(){
  if(vkWidgetInited||!vkId||!window.VKIDSDK)return;
  vkWidgetInited=true;

  const VKID=window.VKIDSDK;
  VKID.Config.init({
    app:parseInt(vkId),
    redirectUrl:window.location.origin+'/vk-callback.html',
    responseMode:VKID.ConfigResponseMode.Callback,
    source:VKID.ConfigSource.LOWCODE,
    scope:''
  });

  const w=document.getElementById('vkW');
  if(!w)return;

  w.innerHTML='<div style="text-align:center;margin:8px 0;font-size:10px;color:var(--t4);letter-spacing:1px;text-transform:uppercase">or</div><div id="vkOneTap"></div>';

  const oneTap=new VKID.OneTap();
  oneTap
    .render({container:document.getElementById('vkOneTap'),showAlternativeLogin:true})
    .on(VKID.WidgetEvents.ERROR,e=>{
      console.error('VK widget error',e);
      ts('VK auth error');
    })
    .on(VKID.OneTapInternalEvents.LOGIN_SUCCESS,async function(payload){
      try{
        await finishVkLogin({code:payload.code,deviceId:payload.device_id});
      }catch(e){
        console.error('VK login success handler error',e);
      }
    });

  window.addEventListener('message',async e=>{
    if(e.origin!==window.location.origin)return;
    const payload=e.data;
    if(!payload||payload.source!=='citizen-vk-auth')return;

    if(payload.error){
      console.error('VK callback error',payload);
      ts(payload.error_description||payload.error||'VK auth error');
      return;
    }

    try{
      await finishVkLogin({
        code:payload.code,
        deviceId:payload.device_id||null,
        redirectUri:payload.redirect_uri||window.location.origin+'/vk-callback.html'
      });
    }catch(err){
      console.error('VK callback finish error',err);
    }
  },{once:false});
}

async function finishVkLogin({code,deviceId=null,redirectUri=null}){
  if(!code)return;
  if(vkProcessedCodes.has(code))return;
  vkProcessedCodes.add(code);

  try{
    if(deviceId&&window.VKIDSDK){
      const VKID=window.VKIDSDK;
      const data=await VKID.Auth.exchangeCode(code,deviceId);
      await sendVkTokenToBackend(data);
      return;
    }

    const r=await fetch(`${A}/auth/vk`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        code,
        redirect_uri:redirectUri||window.location.origin+'/vk-callback.html'
      })
    });

    const d=await r.json();
    if(!r.ok||d.error){
      throw new Error(d.error||'VK auth error');
    }

    tk=d.token;
    CU=d.user;
    localStorage.setItem('ct',tk);
    cA();
    iS();
    rH();
    ts('Signed in via VK');
  }catch(e){
    vkProcessedCodes.delete(code);
    console.error('VK finish error',e);
    ts(e.message||'VK auth error');
  }
}

async function sendVkTokenToBackend(data){
  const r=await fetch(`${A}/auth/vk`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      token:data.access_token,
      vk_data:data
    })
  });
  const d=await r.json();
  if(!r.ok||d.error){
    throw new Error(d.error||'VK auth error');
  }
  tk=d.token;
  CU=d.user;
  localStorage.setItem('ct',tk);
  cA();
  iS();
  rH();
  ts('Signed in via VK');
}

function rH(){const el=document.getElementById('hdrA');if(CU){const ia=['moderator','admin'].includes(CU.trust_level);document.getElementById('admT').style.display=ia?'block':'none';el.innerHTML=`<div style="display:flex;border:1px solid var(--brd);border-radius:3px;overflow:hidden;margin-right:4px"><button style="background:${lang==='ru'?'var(--gold)':'transparent'};border:none;color:${lang==='ru'?'var(--bg)':'var(--t4)'};padding:4px 7px;font-size:9px;font-weight:700;cursor:pointer;font-family:var(--mono)" onclick="sLn('ru')">RU</button><button style="background:${lang==='en'?'var(--gold)':'transparent'};border:none;color:${lang==='en'?'var(--bg)':'var(--t4)'};padding:4px 7px;font-size:9px;font-weight:700;cursor:pointer;font-family:var(--mono)" onclick="sLn('en')">EN</button></div><button class="hb ${CU.is_streamer?'active':''}" onclick="tStr()">Streamer</button><button class="hb notif-dot" data-count="0" onclick="tNo()" id="nB">Notif</button><button class="hb danger" onclick="tSOS()">SOS</button><button class="hb accent" onclick="sRp()">+ Report</button><div class="user-chip" onclick="lo()" title="Sign out"><div class="user-av" style="background:${CU.avatar_color}">${CU.username[0].toUpperCase()}</div><span class="user-nm">${CU.username}</span></div>`;lNC();}else el.innerHTML=`<button class="hb" onclick="oA()">Sign In</button><button class="hb accent" onclick="oA()">+ Report</button>`;}
function rAll(){rFd();rMk();document.getElementById('sL').textContent=incs.length;}
function rFd(){const f=document.getElementById('feed');if(!incs.length){f.innerHTML='<div class="empty"><div class="empty-b">No active incidents</div><div class="empty-s">Press + Report to create one</div></div>';return;}f.innerHTML=incs.map(i=>{const t=T[i.type]||T.other,ag=tAg(i.created_at),mv=mV[i.uid],st=i.status==='confirmed'?'<span class="cst confirmed">Confirmed</span>':i.status==='resolved'?'<span class="cst resolved">Resolved</span>':i.status==='responding'?'<span class="cst responding">Responding</span>':'',tr=i.trust_level==='verified'?'<span class="ctr verified">Verified</span>':i.trust_level==='moderator'?'<span class="ctr moderator">Mod</span>':'',md=(i.media_files||'').split(',').filter(Boolean);return`<div class="card" onclick="fT(${i.lat},${i.lng})"><div class="cs2 ${i.type}"></div><div class="ch"><div><span class="cc ${i.type}">${t.l}</span> ${st}</div><span class="ctm">${ag}</span></div><div class="ctt">${esc(i.description)}</div>${i.address?`<div class="ca">${esc(i.address)}</div>`:''}<div class="cm2"><span class="cmd" style="background:${i.avatar_color||'#666'}">${(i.username||'?')[0].toUpperCase()}</span>${esc(i.username||'?')} ${tr} · Rep ${i.reputation||0}</div>${md.length?`<div class="cmedia">${md.map(m=>`<img class="cthumb" src="/uploads/${m}" onclick="event.stopPropagation()">`).join('')}</div>`:''}<div class="cf"><div class="cacts"><button class="cab ${mv==='confirm'?'vc':''}" onclick="event.stopPropagation();vt('${i.uid}','confirm')">Confirm ${i.confirms||0}</button><button class="cab ${mv==='fake'?'vf':''}" onclick="event.stopPropagation();vt('${i.uid}','fake')">Fake ${i.fakes||0}</button><button class="cab" onclick="event.stopPropagation();oDP('${i.uid}')">Thread ${(i.comment_count||0)+(i.chat_count||0)}</button></div>${i.active_streamers>0?'<span class="stag">Streamer en route</span>':CU&&CU.is_streamer?`<button class="cab" style="color:var(--gold);border-color:var(--gold-brd)" onclick="event.stopPropagation();clS('${i.uid}')">Go live div class="adm-log"><span class="tm">${tAg(i.created_at)}</span> — ${esc(i.username)} reported ${T[i.type]?.l||'Other'}: ${esc(i.description.substring(0,50))}</div>`).join('')}</div>`;}catch{el.innerHTML='<div class="empty"><div class="empty-s">Error</div></div>';}}

function sRp(){if(!CU)return oA();sT3=null;sLL=null;document.getElementById('rD').value='';document.getElementById('rAd').value='';document.getElementById('rTg').value='';document.getElementById('lH').textContent='Or click the map';document.getElementById('fP').innerHTML='';document.getElementById('rF').value='';document.querySelectorAll('.to').forEach(o=>o.classList.remove('sel'));document.getElementById('rS').disabled=true;document.getElementById('rO').classList.add('open');pl=true;document.getElementById('xh').classList.add('on');document.getElementById('map').style.cursor='crosshair';}

function pF(){const fs=document.getElementById('rF').files,p=document.getElementById('fP');p.innerHTML='';Array.from(fs).forEach(f=>{if(f.type.startsWith('image/')){const r=new FileReader();r.onload=e=>{const i=document.createElement('img');i.src=e.target.result;p.appendChild(i);};r.readAsDataURL(f);}});}
async function sR(){const ds=document.getElementById('rD').value.trim(),ad=document.getElementById('rAd').value.trim(),tg=document.getElementById('rTg').value.trim();let la,ln;if(sLL){la=sLL.lat;ln=sLL.lng;}else{const c=map.getCenter();la=c.lat+(Math.random()-.5)*.02;ln=c.lng+(Math.random()-.5)*.02;}const fd=new FormData();fd.append('type',sT3);fd.append('description',tg?ds+' '+tg:ds);fd.append('address',ad);fd.append('lat',la);fd.append('lng',ln);for(const f of document.getElementById('rF').files)fd.append('media',f);try{const r=await fetch(`${A}/incidents`,{method:'POST',headers:{Authorization:`Bearer ${tk}`},body:fd});const d=await r.json();if(!r.ok){ts(d.error);return;}incs.unshift(d.incident);if(sk)sk.emit('new_incident',d.incident);rAll();cR();ts('Submitted');map.flyTo([la,ln],15);}catch{ts('Error');}}
async function vt(u,t){if(!CU)return oA();try{const r=await fetch(`${A}/incidents/${u}/vote`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${tk}`},body:JSON.stringify({vote_type:t})});if(!r.ok)return;mV[u]=mV[u]===t?null:t;if(sk)sk.emit('vote_update',{uid:u});lI();}catch{}}
async function clS(u){try{const r=await fetch(`${A}/incidents/${u}/claim`,{method:'POST',headers:{Authorization:`Bearer ${tk}`}});if(r.ok){if(sk)sk.emit('streamer_claim',{incident_uid:u});lI();ts('Going live');}else ts((await r.json()).error);}catch{}}
async function tStr(){if(!CU)return oA();try{const r=await fetch(`${A}/auth/streamer`,{method:'PATCH',headers:{Authorization:`Bearer ${tk}`}});const d=await r.json();CU.is_streamer=d.is_streamer;rH();rFd();ts(d.is_streamer?'Streamer on':'Streamer off');}catch{}}
async function tSOS(){if(!CU)return oA();if(!confirm('Send SOS?'))return;if(navigator.geolocation)navigator.geolocation.getCurrentPosition(async p=>{try{const r=await fetch(`${A}/sos`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${tk}`},body:JSON.stringify({lat:p.coords.latitude,lng:p.coords.longitude})});if(r.ok){if(sk)sk.emit('sos_alert',{lat:p.coords.latitude,lng:p.coords.longitude});ts('SOS sent');lI();}}catch{ts('Error');}},()=>ts('No location'));else ts('No geolocation');}
function tgP(){if(!CU)return oA();iP=!iP;document.getElementById('mP').classList.toggle('on',iP);if(iP){fetch(`${A}/patrol/toggle`,{method:'PATCH',headers:{Authorization:`Bearer ${tk}`}});if(navigator.geolocation)pW=navigator.geolocation.watchPosition(p=>{fetch(`${A}/patrol/location`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${tk}`},body:JSON.stringify({lat:p.coords.latitude,lng:p.coords.longitude})});if(sk)sk.emit('patrol_update',{lat:p.coords.latitude,lng:p.coords.longitude,avatar_color:CU.avatar_color});},{},{enableHighAccuracy:true});if(sk)sk.emit('patrol_start');ts('Patrol on');}else{fetch(`${A}/patrol/toggle`,{method:'PATCH',headers:{Authorization:`Bearer ${tk}`}});if(pW)navigator.geolocation.clearWatch(pW);if(sk)sk.emit('patrol_stop');ts('Patrol off');}}
function uP(d){if(pM[d.user_id])map.removeLayer(pM[d.user_id]);const ic=L.divIcon({className:'',html:`<div class="patrol-d">${d.username[0].toUpperCase()}</div>`,iconSize:[24,24],iconAnchor:[12,12]});pM[d.user_id]=L.marker([d.lat,d.lng],{icon:ic}).addTo(map);}
async function lPt(){try{const r=await fetch(`${A}/patrol/active`);const d=await r.json();(d.patrols||[]).forEach(p=>uP({user_id:p.id,username:p.username,lat:p.patrol_lat,lng:p.patrol_lng}));}catch{}}
async function ckS(){const c=map.getCenter();try{const r=await fetch(`${A}/analytics/safety?lat=${c.lat}&lng=${c.lng}`);const d=await r.json();L.popup().setLatLng(c).setContent(`<div style="text-align:center"><div style="font-family:var(--serif);font-size:36px;color:${d.level==='safe'?'var(--grn)':d.level==='moderate'?'var(--gold)':'var(--red)'}">${d.score}</div><div style="font-size:10px;color:var(--t3)">Safety · ${d.total_incidents} in 30d</div></div>`).openOn(map);}catch{}}
function tgH(){sH=!sH;document.getElementById('mH').classList.toggle('on',sH);if(sH)uH();else if(hL){map.removeLayer(hL);hL=null;}}
function uH(){if(hL)map.removeLayer(hL);const p=incs.map(i=>[i.lat,i.lng,(i.confirms||0)+1]);if(p.length)hL=L.heatLayer(p,{radius:25,blur:18,maxZoom:15,gradient:{0.2:'#5a8cbf',0.4:'#5a9',0.6:'#c8a44e',0.8:'#bf8a4e',1:'#c44'}}).addTo(map);}
function oDP(u){dI2=incs.find(i=>i.uid===u);if(!dI2)return;document.getElementById('dp').classList.add('open');dM2='c';document.querySelectorAll('.dp-t').forEach(t=>t.classList.remove('on'));document.querySelector('.dp-t').classList.add('on');document.querySelectorAll('.dptc').forEach(t=>t.classList.remove('on'));document.getElementById('dC').classList.add('on');document.getElementById('dI').style.display='flex';lCm();}
function cDP(){document.getElementById('dp').classList.remove('open');dI2=null;}
function dTb(m,el){dM2=m;document.querySelectorAll('.dp-t').forEach(t=>t.classList.remove('on'));el.classList.add('on');document.querySelectorAll('.dptc').forEach(t=>t.classList.remove('on'));document.getElementById({c:'dC',ch:'dCh',tl:'dTL',m:'dM'}[m]).classList.add('on');document.getElementById('dI').style.display=(m==='c'||m==='ch')?'flex':'none';if(m==='c')lCm();else if(m==='ch')lCht();else if(m==='tl')lTL();else lMd();}
async function lCm(){if(!dI2)return;const el=document.getElementById('dC');try{const r=await fetch(`${A}/incidents/${dI2.uid}/comments`);const d=await r.json();if(!d.comments?.length){el.innerHTML='<div class="empty"><div class="empty-s">No comments</div></div>';return;}el.innerHTML=d.comments.map(c=>`<div class="cm3"><div class="cm3a" style="background:${c.avatar_color}">${c.username[0].toUpperCase()}</div><div><div class="cm3h"><strong>${esc(c.username)}</strong><span>${tAg(c.created_at)}</span></div><div class="cm3t">${esc(c.text)}</div></div></div>`).join('');el.scrollTop=el.scrollHeight;}catch{}}
async function lCht(){if(!dI2)return;const el=document.getElementById('dCh');try{const r=await fetch(`${A}/incidents/${dI2.uid}/chat`);const d=await r.json();if(!d.messages?.length){el.innerHTML='<div class="empty"><div class="empty-s">Empty</div></div>';return;}el.innerHTML=d.messages.map(m=>`<div class="chtm"><span class="chtu">${esc(m.username)}</span> <span class="chtt">${esc(m.text)}</span></div>`).join('');el.scrollTop=el.scrollHeight;}catch{}}
async function lTL(){if(!dI2)return;const el=document.getElementById('dTL');try{const r=await fetch(`${A}/incidents/${dI2.uid}/timeline`);const d=await r.json();if(!d.timeline?.length){el.innerHTML='<div class="empty"><div class="empty-s">No data</div></div>';return;}el.innerHTML=d.timeline.map((t,i)=>`<div class="tli">${i<d.timeline.length-1?'<div class="tll"></div>':''}<div class="tld ${t.event_type}"></div><div><div class="tltx">${esc(t.description)}</div><div class="tlti">${tAg(t.created_at)}${t.username?' · '+esc(t.username):''}</div></div></div>`).join('');}catch{}}
async function lMd(){if(!dI2)return;const el=document.getElementById('dM'),m=(dI2.media_files||'').split(',').filter(Boolean);if(!m.length){el.innerHTML='<div class="empty"><div class="empty-s">No media</div></div>';return;}el.innerHTML=`<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px">${m.map(f=>`<img src="/uploads/${f}" style="width:100%;border-radius:6px;border:1px solid var(--brd);cursor:pointer" onclick="window.open('/uploads/${f}')">`).join('')}</div>`;}
async function dSn(){if(!CU)return oA();if(!dI2)return;const inp=document.getElementById('dIn'),tx=inp.value.trim();if(!tx)return;inp.value='';if(dM2==='c'){try{const r=await fetch(`${A}/incidents/${dI2.uid}/comments`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${tk}`},body:JSON.stringify({text:tx})});if(r.ok){if(sk)sk.emit('new_comment',{incident_uid:dI2.uid});lCm();lI();}}catch{}}else if(dM2==='ch'){try{const r=await fetch(`${A}/incidents/${dI2.uid}/chat`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${tk}`},body:JSON.stringify({text:tx})});if(r.ok){if(sk)sk.emit('chat_message',{incident_uid:dI2.uid,text:tx});lCht();}}catch{}}}
async function lNC(){if(!tk)return;try{const r=await fetch(`${A}/notifications`,{headers:{Authorization:`Bearer ${tk}`}});const d=await r.json();const b=document.getElementById('nB');if(b)b.dataset.count=d.unread||0;}catch{}}
async function tNo(){const dd=document.getElementById('ndd');if(dd.classList.contains('open')){dd.classList.remove('open');return;}try{const r=await fetch(`${A}/notifications`,{headers:{Authorization:`Bearer ${tk}`}});const d=await r.json();dd.innerHTML=(d.notifications||[]).slice(0,15).map(n=>`<div class="ndi ${n.is_read?'':'ur'}"><div>${esc(n.message)}</div><div class="ndt">${tAg(n.created_at)}</div></div>`).join('')||'<div class="ndi">None</div>';dd.classList.add('open');fetch(`${A}/notifications/read`,{method:'PATCH',headers:{Authorization:`Bearer ${tk}`}});const b=document.getElementById('nB');if(b)b.dataset.count=0;}catch{}}
document.addEventListener('click',e=>{if(!e.target.closest('#nB')&&!e.target.closest('.ndd'))document.getElementById('ndd').classList.remove('open');});
function sT(t,el){document.querySelectorAll('.sb-ni').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.pn').forEach(x=>x.classList.remove('on'));el.classList.add('on');document.getElementById({feed:'pFeed',an:'pAn',prof:'pProf',adm:'pAdm'}[t]).classList.add('on');if(t==='an')lAn();if(t==='prof')lPr();if(t==='adm')rAd();}
function sF(f,el){ft=f;document.querySelectorAll('.fc').forEach(c=>c.classList.remove('on'));el.classList.add('on');lI();}
function fT(la,ln){map.flyTo([la,ln],16,{duration:.7});}
function tAg(t){const d=new Date(t+(typeof t==='string'&&!t.endsWith('Z')?'Z':''));const s=Math.floor((Date.now()-d.getTime())/1000);if(s<60)return'now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function ts(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
async function cEm(){try{const r=await fetch(`${A}/emergency/active`);const d=await r.json();if(d.alerts?.length){const a=d.alerts[0],b=document.getElementById('eB');b.textContent=a.title+': '+a.message;b.classList.add('show');setTimeout(()=>b.classList.remove('show'),20000);}}catch{}}
if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
(async()=>{await cAu();rH();lI();lPt();cEm();iVk();setInterval(lI,12000);setInterval(lNC,30000);setInterval(lPt,15000);})();
