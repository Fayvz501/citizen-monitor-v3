<!DOCTYPE html>
<html><head><title>VK Auth</title></head>
<body style="background:#141210;color:#e8e4dc;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh">
<div style="text-align:center"><h2>Авторизация...</h2></div>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
if (code && window.opener) {
  window.opener.postMessage({ type: 'vk_code', code: code }, '*');
  setTimeout(() => window.close(), 500);
} else {
  document.querySelector('h2').textContent = 'Закройте это окно';
  setTimeout(() => window.close(), 2000);
}
</script>
</body></html>
